services:
  - type: web
    name: fb-ads-backend-final
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python -m playwright install chromium && python -m playwright install-deps chromium || echo "deps install warning ignored, continuing"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300 --access-logfile -
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
